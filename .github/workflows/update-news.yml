name: Auto Actualizar Noticias

on:
  schedule:
    # Se ejecuta cada 12 horas: a las 09:00 y a las 21:00 (Hora de Argentina)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Permite disparar la automatización manualmente desde la pestaña Actions en GitHub

# Otorgar permisos de escritura al token de GitHub Actions para permitir el git push
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar script de reposición de noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/update-news.js

      - name: Commitear y Subir cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json noticias.json notas/ trends.json sitemap.xml robots.txt
          # Solo hacer commit si el archivo noticias.json o las notas cambiaron
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: actualización de noticias y páginas estáticas" && git push)

      - name: Instalar navegador Chromium para Playwright
        run: npx playwright install chromium

      - name: Publicar Tweet en X (Twitter)
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          HEADLESS: 'true'
        run: node scripts/post-tweet.js

      - name: Mostrar Borrador de Tweet para X
        if: always()
        run: |
          if [ -f tweet.txt ]; then
            echo "### 🗞️ Panorama.ar — Automatización de Noticias" >> $GITHUB_STEP_SUMMARY
            echo "El sitio web de Panorama.ar se ha actualizado con éxito con noticias frescas de hoy." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 🐦 Borrador del Tweet sugerido para X:" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat tweet.txt >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "*Tip: ¡Solo copialo y pegalo en tu cuenta de X!*" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🗞️ Panorama.ar — Automatización de Noticias" >> $GITHUB_STEP_SUMMARY
            echo "No se encontraron nuevas noticias hoy o no se pudo generar el borrador de Tweet." >> $GITHUB_STEP_SUMMARY
          fi
