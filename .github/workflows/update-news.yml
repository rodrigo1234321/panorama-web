name: Auto Actualizar Noticias

on:
  schedule:
    # Se ejecuta a las 09:00 y 21:00 (Hora Argentina), que equivale a las 12:00 y 00:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Permite disparar la automatización manualmente desde la pestaña Actions en GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar script de reposición de noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update-news.js

      - name: Commitear y Subir cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          # Solo hacer commit si el archivo noticias.json cambió
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: actualización periódica de noticias" && git push)
